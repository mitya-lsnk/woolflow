# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Hermes Agent on Render — Free tier (frankfurt), dashboard OFF by default.
#
# A tiny in-container port stub (see Dockerfile) keeps the healthcheck green;
# Hermes itself talks to Telegram over an outbound long-poll. The Free instance
# has NO persistent disk, so set all secrets in the Render Dashboard Environment
# tab (they survive spin-downs); anything written under /opt/data is lost on
# redeploy/restart.
services:
- type: web
  name: woolflow
  runtime: docker
  region: frankfurt
  plan: free
  dockerfilePath: ./Dockerfile
  autoDeployTrigger: off
  # The stub answers 200 on "/", which is what Render probes.
  healthCheckPath: /
  envVars:
  # Gateway token, generated once at first deploy. Reuse as API_SERVER_KEY if
  # you later enable the OpenAI-compatible API server.
  - key: HERMES_GATEWAY_TOKEN
    generateValue: true
  # Dashboard OFF by default to stay within the 512 MB Free RAM cap.
  # To configure via browser: set HERMES_DASHBOARD=1 in the Render Dashboard
  # Environment tab, click Restart, finish setup, then set it back to 0.
  - key: HERMES_DASHBOARD
    value: "0"
  # Telegram chat (outbound long-poll — no open port needed for messaging).
  - key: TELEGRAM_BOT_TOKEN
    sync: false
  # LLM provider key. OpenRouter is the easiest single key for most models.
  # Set it in the Render Dashboard Environment tab so it survives spin-downs.
  - key: OPENROUTER_API_KEY
    sync: false
